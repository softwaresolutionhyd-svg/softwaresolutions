name: Deploy Signature

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify Laravel project
        run: test -f composer.json || (echo "composer.json not found" && exit 1)

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, curl, fileinfo, pdo, mysql, tokenizer, bcmath
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Setup Node
        if: hashFiles('package-lock.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Build frontend assets
        if: hashFiles('package-lock.json') != ''
        run: |
          npm ci
          npm run build

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy via FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" <<EOF
          set ftp:ssl-allow no
          set ftp:passive-mode on
          set ftp:prefer-epsv false
          set net:timeout 30
          set net:max-retries 3
          mirror --reverse --delete --verbose \
            --exclude-glob .git* \
            --exclude-glob .github/** \
            --exclude-glob node_modules/** \
            --exclude-glob tests/** \
            --exclude-glob .env \
            --exclude-glob .env.* \
            --exclude-glob storage/logs/** \
            --exclude-glob storage/framework/cache/data/** \
            --exclude-glob storage/framework/sessions/** \
            --exclude-glob storage/framework/views/** \
            --exclude-glob .phpunit.result.cache \
            --exclude-glob phpunit.xml \
            ./ "$FTP_SERVER_DIR"
          bye
          EOF
